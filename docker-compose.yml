version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: dtq-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data 
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s 
      timeout: 5s 
      retries: 3 

volumes:
  redis-data:
